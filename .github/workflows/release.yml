name: Release

# Publishes @michi-vz/* to npm via Changesets. Requires the repo secret NPM_TOKEN
# (a granular/automation token with publish rights to the @michi-vz scope).
#
# MANUAL ONLY (workflow_dispatch): publishing is a deliberate action — trigger it
# from the Actions tab ("Run workflow") when you're ready. It will NOT run on push,
# so adding NPM_TOKEN never auto-publishes.
on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      # Opens/updates a "Version Packages" PR when changesets are pending, and
      # publishes to npm once that PR is merged (or when versions are ahead of the
      # registry). `pnpm release` = turbo build + changeset publish.
      - uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
