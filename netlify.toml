# Netlify build config for the @michi-vz docs site.
# Netlify reads this automatically — no need to set the build command / publish
# directory in the UI. pnpm is auto-detected from pnpm-lock.yaml.
#
# `--filter "docs..."` builds the docs package AND its workspace dependencies
# (@michi-vz/examples, @michi-vz/wc, @michi-vz/core) in topological order, so
# their dist/ entries exist before VitePress resolves them. Plain
# `--filter docs` would build docs alone and fail to resolve @michi-vz/examples.
[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter \"docs...\" build"
  publish = "apps/docs/.vitepress/dist"

[build.environment]
  NODE_VERSION = "20"

# Allow example JSON to be fetched cross-origin later (CodePen, embeds).
[[headers]]
  for = "/examples/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
